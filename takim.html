<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takım Ekle</title>
    <link rel="stylesheet" href="takim.css">
</head>
<body>
   <div class="card-2">
    <h2 class="başlik">Bir Takım Ekleyiniz </h2>
    
    <form class="forms" id="takimForm">
        <p class="text-class">Oluşturduğunuz liglerden istediğiniz ligi seçip takımı ekleyiniz</p>
        
        <select class="select-lig" id="ligSecimi">
            <option value="" disabled selected>Lütfen bir lig seçiniz</option>
        </select>
        
        <p id="sayac" style="color: white; margin: 10px 0; font-weight: bold; text-align: center;"></p>

        <input class="takim-ekle" id="takimAdi" type="text" placeholder="Bir takım yazınız" required>
        <button class="son-sayfa-gecis" type="submit">Ekleyiniz</button>
    </form>

    <div id="eklenenTakimlarListesi" style="width: 100%; margin-top: 15px; max-height: 180px; overflow-y: auto; color: white;"></div>

    <!-- Yeni Sayfaya Yönlendiren Buton -->
    <a href="fikstur.html" class="devam-link" style="margin-top: 15px; display: block; text-decoration: none;">
        <button class="devamin-devami" style="width: 100%;">Fikstür Oluştur →</button>
    </a>
</div>
<script src="takim.js"></script>
</body>
</html>
