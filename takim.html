<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takım Ekle</title>
    <link rel="stylesheet" href="takim.css">
</head>
<body>
   <div class="card-2">
    <h2 class="başlik">Bir Takım Ekleyiniz </h2>
    
    <p id="sayac" style="color: white; margin-bottom: 10px; font-weight: bold;"></p>

    <form class="forms" id="takimForm">
        <p class="text-class">Oluşturduğunuz liglerden istediğiniz ligi seçip takımı ekleyiniz</p>
        
        <select class="select-lig" id="ligSecimi">
            <option value="" disabled selected>Lütfen bir lig seçiniz</option>
        </select>
        
        <input class="takim-ekle" id="takimAdi" type="text" placeholder="Bir takım yazınız" required>
        <button class="son-sayfa-gecis" type="submit">Ekleyiniz</button>
    </form>

    <!-- EKLEME: Eklenen takımları ve sil butonlarını göreceğimiz yeni alan -->
    <div id="eklenenTakimlarListesi" style="width: 100%; margin-top: 20px; max-height: 200px; overflow-y: auto; color: white;"></div>

    <a href="tablo.html" class="devam-link">
        <button class="devamin-devami">Devam et</button>
    </a>
</div>
<script src="takim.js"></script>
</body>
</html>
