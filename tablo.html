<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puan Durumu</title>
    <link rel="stylesheet" href="tablo.css">
</head>
<body>

<h2 class="başlik-dis">Puan Durumu</h2>

<div class="card-table">
    <!-- YENİ: Lig Seçme/Filtreleme Kutusu -->
    <div style="margin-bottom: 15px; text-align: center;">
        <select id="tabloLigFiltre" style="padding: 10px; border-radius: 6px; font-size: 16px; min-width: 200px;">
            <option value="" disabled selected>Görüntülenecek Ligi Seçin</option>
        </select>
    </div>

    <div class="table-container">
        <table class="puan-tablosu">
            <thead>
                <tr>
                    <th>Sıra</th>
                    <th>Takım Adı</th>
                    <th>AG</th>
                    <th>YG</th>
                    <th>AV</th>
                    <th>Puan</th>
                </tr>
            </thead>
            <tbody id="puanTablosuBody">
                <!-- JavaScript burayı filtrelenmiş verilerle dolduracak -->
            </tbody>
        </table>
    </div>
    
    <div class="buton-lar">
        <a href="takim.html" class="btn-aksiyon btn-geri">← Takım Eklemeye Dön</a>
        <button onclick="if(confirm('Tüm verileri silmek istediğinize emin misiniz?')) { localStorage.clear(); location.href='index.html'; }" class="btn-aksiyon btn-sifirla">
            Her Şeyi Sıfırla
        </button>
    </div>
</div>

<script src="tablo.js"></script>
</body>
</html>
