<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel Fikstür Oluştur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="color: #333; text-align: center; margin-bottom: 15px;">Fikstür & Maç Simülasyonu</h2>

<div class="card" style="max-width: 550px; width: 100%;">
    <p style="color: white; margin-bottom: 8px;">1. Ligi Seçin:</p>
    <select id="fiksturLigSecimi" style="width: 100%; padding: 10px; border-radius: 6px; font-size: 16px; margin-bottom: 15px;">
        <option value="" disabled selected>Bir lig seçiniz</option>
    </select>

    <!-- Maç Kurma Alanı (Lig seçilince görünecek) -->
    <div id="macKurmaAlani" style="display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
        <p style="color: white; margin-top: 0; font-weight: bold; text-align: center;">2. Maç Eşleşmesini Kurun:</p>
        
        <div style="display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 10px;">
            <select id="evSahibiSelect" style="width: 45%; padding: 8px; border-radius: 4px; border: none; font-size: 13px;"></select>
            <input type="number" id="evSkorInput" min="0" value="0" style="width: 35px; text-align: center; padding: 6px; border-radius: 4px; border: none;">
            <span style="color: white; font-weight: bold;">-</span>
            <input type="number" id="depSkorInput" min="0" value="0" style="width: 35px; text-align: center; padding: 6px; border-radius: 4px; border: none;">
            <select id="deplasmanSelect" style="width: 45%; padding: 8px; border-radius: 4px; border: none; font-size: 13px;"></select>
        </div>

        <button id="macEkleBtn" class="lig-ekle" style="width: 100%; padding: 8px; background-color: #2196F3; color: white;">+ Maçı Fikstüre Ekle</button>
    </div>

    <!-- Eklenen Maçların Listeleneceği Yer -->
    <div id="eklenenMaclarListesi" style="width: 100%; max-height: 200px; overflow-y: auto;"></div>

    <button id="sonuclariKaydetBtn" class="devam" style="display: none; margin-top: 15px; background-color: #28a745;">
        Sonuçları İşle ve Puan Durumuna Git →
    </button>
</div>

<script src="fikstur.js"></script>
</body>
</html>
